<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSee$ Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #080d1a; --bg3: #141f35; --card: #111827; --border: #1e2d47;
            --accent: #4f6ef7; --accent2: #06d6a0; --accent3: #f7c948;
            --text: #e8eaf6; --muted: #5a6a85;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }
        .page { display: none; height: calc(100vh - 65px); overflow-y: auto; padding: 0 16px 100px; }
        .page.active-page { display: block; }
        .page::-webkit-scrollbar { display: none; }
        .global-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 10px; background: var(--bg); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .profile-row { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; overflow: hidden; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-size: 15px; font-weight: 600; }
        .user-id { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
        .balance-block { text-align: right; }
        .balance-label { font-size: 10px; color: var(--muted); }
        .balance-val { font-size: 22px; font-weight: 700; color: var(--accent2); font-family: 'JetBrains Mono', monospace; letter-spacing: -1px; }
        
        /* Card Styles */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 14px; }
        .card-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0; }
        .stat-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 14px 8px; text-align: center; }
        .stat-val { font-size: 17px; font-weight: 700; font-family: 'JetBrains Mono', monospace; color: var(--accent); }
        .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 4px; }

        /* Task & Navigation */
        .task-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 14px; }
        .btn-open { border: none; border-radius: 10px; font-weight: 700; cursor: pointer; background: var(--accent); color: white; padding: 9px 18px; font-size: 13px; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0 14px; border-top: 1px solid var(--border); z-index: 999; }
        .nav-item { text-align: center; color: var(--muted); font-size: 10px; flex: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; }
        .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--accent2); color: #080d1a; padding: 10px 20px; border-radius: 30px; font-size: 13px; font-weight: 700; z-index: 9999; opacity: 0; transition: all 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="global-header">
    <div class="profile-row">
        <div class="avatar" id="user-avatar">A</div>
        <div>
            <div class="user-name" id="display-name">Loading...</div>
            <div class="user-id" id="display-id">ID: ---</div>
        </div>
    </div>
    <div class="balance-block">
        <div class="balance-label">Total Balance</div>
        <div class="balance-val" id="global-balance">$0.000</div>
    </div>
</div>
<div class="toast" id="toast"></div>

<div id="home" class="page active-page">
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="stat-withdrawn">$0.00</div><div class="stat-lbl">Withdrawn</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-tasks">0</div><div class="stat-lbl">Tasks</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-refs">0</div><div class="stat-lbl">Refs</div></div>
    </div>
    <div class="card">
        <div class="card-title">Income (7 Days)</div>
        <canvas id="incomeChart" height="130"></canvas>
    </div>
</div>

<div id="task" class="page">
    <div class="card">
        <div class="task-card">
            <div class="task-name">CPAlead Tasks</div>
            <button class="btn-open" onclick="openOffer('cpalead', 0.030)">Open Offer</button>
        </div>
        <div class="task-card">
            <div class="task-name">CPAGrip Tasks</div>
            <button class="btn-open" onclick="openOffer('cpagrip', 0.050)">Open Offer</button>
        </div>
    </div>
</div>

<div id="refer" class="page">...</div>
<div id="wallet" class="page">...</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="nav('home',this)"><i class="material-icons-round">home</i>Home</div>
    <div class="nav-item" onclick="nav('task',this)"><i class="material-icons-round">task_alt</i>Tasks</div>
    <div class="nav-item" onclick="nav('refer',this)"><i class="material-icons-round">group_add</i>Refer</div>
    <div class="nav-item" onclick="nav('wallet',this)"><i class="material-icons-round">account_balance_wallet</i>Wallet</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // সব লজিক এখানে একত্রে কাজ করবে
    function nav(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(pageId).classList.add('active-page');
        el.classList.add('active');
    }

    function openOffer(source, amount) {
        // আপনার আগের ১৫ সেকেন্ড ভ্যালিডেশন এবং বোনাস লজিক এখানে যুক্ত হবে
        tg.HapticFeedback.impactOccurred('medium');
        // লিঙ্ক ওপেন লজিক...
        showToast("Task started!");
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }
</script>
</body>
</html>
