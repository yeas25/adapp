<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdSee$ Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #080d1a; --bg2: #0b1426; --bg3: #141f35; --card: #111827; --border: #1e2d47;
            --accent: #4f6ef7; --accent2: #06d6a0; --accent3: #f7c948;
            --text: #e8eaf6; --muted: #5a6a85;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; }
        
        .global-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); }
        .profile-section { display: flex; align-items: center; gap: 10px; }
        .profile-circle { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; font-size: 16px; }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 600; font-size: 15px; }
        .header-balance { text-align: right; }
        .header-balance span { font-size: 11px; color: var(--muted); display: block; }
        .header-balance strong { font-size: 20px; color: var(--accent2); font-family: 'JetBrains Mono', monospace; }

        .app-container { height: calc(100% - 145px); overflow-y: auto; padding: 20px; }
        .page { display: none; animation: fadeIn 0.2s ease-in-out; }
        .page.active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .stats-row-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-small-box { background: var(--bg3); padding: 12px 8px; border-radius: 14px; text-align: center; border: 1px solid var(--border); }
        .stat-small-box strong { font-family: 'JetBrains Mono', monospace; font-size: 15px; display: block; color: var(--text); margin-bottom: 2px; }
        .stat-small-box span { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .card-box { background: var(--card); border: 1px solid var(--border); padding: 18px; border-radius: 16px; margin-bottom: 15px; }
        .card-title { font-size: 14px; font-weight: 600; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--accent); }
        
        .task-header-box { background: rgba(79, 110, 247, 0.05); padding: 15px; border-radius: 16px; text-align: center; border: 1px dashed var(--accent); margin-bottom: 20px; font-size: 13px; color: #a0aec0; }
        
        .item-row { background: var(--bg3); padding: 14px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); margin-bottom: 12px; }
        .task-left-section { display: flex; align-items: center; gap: 12px; }
        .web-icon-container { background: var(--bg); border: 1px solid var(--border); width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .web-icon-container i { color: var(--accent); font-size: 24px; }
        .task-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .task-reward { font-size: 12px; color: var(--accent2); font-family: 'JetBrains Mono', monospace; font-weight: bold; }
        
        .btn-start-task { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(79, 110, 247, 0.2); }
        .btn-start-task:hover { opacity: 0.9; }

        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg2); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); z-index: 999; height: 70px; }
        .nav-item { text-align: center; color: var(--muted); font-size: 11px; flex: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 500; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 22px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="global-header">
        <div class="profile-section" id="header-profile-block">
            <div class="profile-circle" id="user-avatar">?</div>
            <div class="user-name" id="display-name">Loading...</div>
        </div>
        <div class="header-balance">
            <span>Total Balance</span>
            <strong id="global-balance-text">0 Pts</strong>
        </div>
    </div>

    <div class="app-container">
        <div id="task" class="page active-page">
            <div class="card-box">
                <div class="card-title" style="color: var(--accent3);"><i class="material-icons-round">ads_click</i> 1. Monetag Smart Tasks</div>
                <div class="item-row">
                    <div class="task-left-section">
                        <div class="web-icon-container"><i class="material-icons-round">monetization_on</i></div>
                        <div><div class="task-title">Monetag Earn</div></div>
                    </div>
                    <button class="btn-start-task" onclick="openMonetag()" style="background: var(--accent3); color: var(--bg);">Open</button>
                </div>
            </div>

            <div class="card-box">
                <div class="card-title" style="color: var(--accent);"><i class="material-icons-round">bolt</i> 2. Adsterra Mega Tasks</div>
                <div class="item-row">
                    <div class="task-left-section">
                        <div class="web-icon-container"><i class="material-icons-round">bolt</i></div>
                        <div><div class="task-title">Adsterra Earn</div></div>
                    </div>
                    <button class="btn-start-task" onclick="openAdsterra()">Open</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openMonetag() {
            // আপনার নতুন লিঙ্ক এখানে সেট করা হয়েছে
            window.open('https://omg10.com/4/11005394', '_blank');
        }

        function openAdsterra() {
            window.open('https://www.effectivecpmnetwork.com/vd4ntpq63?key=31e2705ac882890bbedca60c130f0649', '_blank');
        }
    </script>
</body>
</html>
